<script>
  // Tweakable defaults — between markers so the host can rewrite them on disk.
  // The block between EDITMODE-BEGIN and EDITMODE-END must be valid JSON.
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "palette": "caderno",
    "ritmo": "compacto",
    "voz": "editorial"
  }/*EDITMODE-END*/;
  window.__btnTweakDefaults = TWEAK_DEFAULTS;
  // Apply on first paint so the page never flashes the wrong theme.
  for (const k in TWEAK_DEFAULTS) {
    document.documentElement.setAttribute('data-' + k, TWEAK_DEFAULTS[k]);
  }
</script>
